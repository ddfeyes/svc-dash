services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bananas31-backend
    restart: unless-stopped
    ports:
      - "8765:8000"
    volumes:
      - bananas31-data:/app/data
      - ${HOME}/.lain-secrets/.env:/secrets/.env:ro
    environment:
      - DOTENV_PATH=/secrets/.env
      # SYMBOLS can be overridden here or via .env: SYMBOLS=BANANAS31USDT,BTCUSDT
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/symbols"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: nginx:alpine
    container_name: bananas31-frontend
    restart: unless-stopped
    ports:
      - "8766:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  bananas31-data:
