dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3000
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - desktop

permissions:
  dangerous: true

projects:
  svc-dash:
    name: svc-dash
    sessionPrefix: sd
    repo: ddfeyes/svc-dash
    path: /Users/aivan/svc-dash
    defaultBranch: main
    skillsDir: ~/.agents/skills
    workflowsDir: /Users/aivan/svc-dash/.ao/workflows
    agentConfig:
      permissions: skip
      model: claude-sonnet-4-6
      thinking: high
    agentRules: |-
      Follow Python best practices, type hints, PEP 8.
      Use conventional commits (feat:, fix:, chore:, refactor:, test:).
      Write tests before implementation (TDD).
      Run black . and mypy . before pushing.
      Network access: Binance/Bybit WebSocket + REST APIs.
