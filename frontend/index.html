<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <!-- TradingView Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header id="header">
  <div id="header-title">Dashboard</div>
  <div id="symbol-tabs"></div>
  <div id="last-price">—</div>
  <div id="price-change"></div>
  <div id="header-status" class="disconnected">disconnected</div>
</header>

<!-- ── Alert Bar ───────────────────────────────────────────────────────────── -->
<div id="alert-bar"></div>

<!-- ── Main Grid ───────────────────────────────────────────────────────────── -->
<main id="main">

  <!-- Price Chart -->
  <section class="card" id="card-price">
    <div class="card-header">
      <span class="card-title">Price</span>
      <span class="card-meta">1-min candles · 2h</span>
    </div>
    <div id="price-chart-container" class="empty"></div>
  </section>

  <!-- OI Chart -->
  <section class="card" id="card-oi">
    <div class="card-header">
      <span class="card-title">Open Interest</span>
      <span class="card-meta">USDT · last 200 points</span>
    </div>
    <div id="oi-metrics"></div>
    <div id="oi-chart-container">
      <canvas id="oi-canvas"></canvas>
    </div>
  </section>

  <!-- Trade Tape -->
  <section class="card" id="card-trades">
    <div class="card-header">
      <span class="card-title">Trade Tape</span>
      <span class="card-meta">live · last 100</span>
    </div>
    <div style="display:grid;grid-template-columns:32px 80px 70px 50px;gap:4px;padding:0 4px 4px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">
      <span></span>
      <span style="text-align:right">price</span>
      <span style="text-align:right">usd</span>
      <span style="text-align:right">time</span>
    </div>
    <div id="trade-tape"></div>
  </section>

  <!-- CVD Chart -->
  <section class="card" id="card-cvd">
    <div class="card-header">
      <span class="card-title">CVD</span>
      <span class="card-meta">cumulative volume delta · 1h</span>
    </div>
    <div id="cvd-metrics"></div>
    <div id="cvd-chart-container">
      <canvas id="cvd-canvas"></canvas>
    </div>
  </section>

  <!-- Funding Rate Chart -->
  <section class="card" id="card-funding">
    <div class="card-header">
      <span class="card-title">Funding Rate</span>
      <span class="card-meta">last 100 periods</span>
    </div>
    <div id="funding-metrics"></div>
    <div id="funding-chart-container">
      <canvas id="funding-canvas"></canvas>
    </div>
  </section>

  <!-- Volume Imbalance / Flow -->
  <section class="card" id="card-flow">
    <div class="card-header">
      <span class="card-title">Volume Imbalance</span>
      <span class="card-meta">buy/sell ratio · 1h</span>
    </div>
    <div id="flow-metrics"></div>
    <div id="flow-chart-container">
      <canvas id="flow-canvas"></canvas>
    </div>
  </section>

  <!-- Phase / Market Regime -->
  <section class="card" id="card-phase">
    <div class="card-header">
      <span class="card-title">Market Phase</span>
      <span id="phase-badge" class="card-badge" style="display:none"></span>
      <span class="card-meta">market regime classifier</span>
    </div>
    <div id="phase-content">
      <div class="text-muted" style="font-size:11px;">Loading…</div>
    </div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
